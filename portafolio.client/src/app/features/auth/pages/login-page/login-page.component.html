<app-section-shell
  eyebrow="Acceso"
  title="Zona administrativa"
  description="Inicia sesion con Identity a traves del Gateway. El token y los roles se almacenan desde la respuesta real del backend.">
  <form class="login-card" (ngSubmit)="submit()">
    <label>
      <span>Email</span>
      <input type="email" [(ngModel)]="email" name="email" autocomplete="username" />
    </label>

    <label>
      <span>Password</span>
      <input type="password" [(ngModel)]="password" name="password" autocomplete="current-password" />
    </label>

    <p *ngIf="errorMessage()" class="error-message">{{ errorMessage() }}</p>

    <button type="submit" [disabled]="isSubmitting()">
      {{ isSubmitting() ? 'Entrando...' : 'Entrar' }}
    </button>
  </form>
</app-section-shell>
